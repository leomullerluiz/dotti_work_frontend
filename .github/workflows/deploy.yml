name: Deploy frontend to Hostinger

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create production env
        shell: bash
        run: |
          {
            echo "NEXT_PUBLIC_DOTTI_API_PROXY_BASE=${{ vars.PROD_DOTTI_API_PROXY_BASE || '/api/dotti' }}"
            echo "DOTTI_API_BASE_URL=${{ secrets.PROD_DOTTI_API_INTERNAL_BASE_URL }}"
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}"
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          } > .env.production
          if grep -Eiq 'localhost|127\.0\.0\.1' .env.production; then
            echo "::error::.env.production contains a local URL. Fix the production GitHub secrets/variables before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify standalone assets
        shell: bash
        run: |
          test -f .next/standalone/server.js
          test -d .next/static
          test -n "$(find .next/static -type f -name '*.css' -print -quit)"

      - name: Prepare deploy artifact
        shell: bash
        run: |
          mkdir -p deploy/.next/static
          cp -R .next/standalone/. deploy/
          cp -R .next/static/. deploy/.next/static/
          cp -R public deploy/public
          cp .env.production deploy/.env.production

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: ${{ secrets.HOSTINGER_FTP_SERVER_DIR }}

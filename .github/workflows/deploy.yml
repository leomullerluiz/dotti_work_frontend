name: Deploy frontend to Hostinger

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create production env
        shell: bash
        run: |
          {
            echo "NEXT_PUBLIC_DOTTI_API_BASE_URL=${{ secrets.PROD_DOTTI_API_BASE_URL }}"
            echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}"
            echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          } > .env.production
          if grep -Eiq 'localhost|127\.0\.0\.1' .env.production; then
            echo "::error::.env.production contains a local URL. Fix the production GitHub secrets/variables before deploying."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

      - name: Verify static export
        shell: bash
        run: |
          test -f out/index.html
          test -d out/_next
          test -n "$(find out/_next -type f -name '*.css' -print -quit)"

      - name: Prepare deploy artifact
        shell: bash
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -R out/. deploy/

      - name: Normalize FTP target directory
        shell: bash
        run: |
          server_dir="${{ secrets.HOSTINGER_FTP_SERVER_DIR }}"
          if [ -z "$server_dir" ]; then
            echo "::error::HOSTINGER_FTP_SERVER_DIR is empty."
            exit 1
          fi
          echo "HOSTINGER_FTP_TARGET_DIR=${server_dir%/}/" >> "$GITHUB_ENV"

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: ${{ env.HOSTINGER_FTP_TARGET_DIR }}
